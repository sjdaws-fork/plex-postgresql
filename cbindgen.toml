language = "C"
include_guard = "PLEX_PG_CORE_FFI_H"
pragma_once = true
cpp_compat = true
documentation_style = "c"
usize_is_size_t = true
sort_by = "Name"
autogen_warning = "/* This file is generated by cbindgen. Do not edit directly. */"

[parse]
parse_deps = false
include = ["plex-pg-abi"]

[export]
include = [
  "SqlTranslation",
  "sql_translate",
  "sql_translation_free",
  "sql_translator_cleanup",
  "sql_translator_free",
  "sql_translator_init",
  "sql_translator_last_error",
  "sql_translator_translate",
  "sql_translator_translate_full",
  "sql_translator_translation_free",
]
item_types = ["functions", "structs"]

[fn]
rename_args = "None"
sort_by = "Name"
