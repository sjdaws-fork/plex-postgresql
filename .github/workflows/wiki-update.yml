name: Update Versions on Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  update-versions:
    name: Update version refs in wiki + READMEs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Determine old and new version
        id: ver
        run: |
          set -eux
          NEW="$(cat VERSION)"
          # Find the previous tag to know what to replace
          OLD="$(git tag -l 'v0.9.*' | sort -V | tail -2 | head -1 | sed 's/^v//')"
          echo "new=${NEW}" >> "$GITHUB_OUTPUT"
          echo "old=${OLD}" >> "$GITHUB_OUTPUT"
          echo "Updating v${OLD} → v${NEW}"

      - name: Update README.md and README.es.md
        run: |
          set -eux
          OLD="${{ steps.ver.outputs.old }}"
          NEW="${{ steps.ver.outputs.new }}"
          for f in README.md README.es.md; do
            [ -f "$f" ] || continue
            sed -i "s|v${OLD}|v${NEW}|g" "$f"
            echo "Updated $f"
          done

      - name: Commit README changes
        run: |
          set -eux
          git diff --quiet README.md README.es.md && { echo "No README changes"; exit 0; }
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md README.es.md
          git commit -m "auto: bump version refs in READMEs to v${{ steps.ver.outputs.new }}"
          git push origin HEAD:main

      - name: Clone wiki
        run: |
          set -eux
          git clone "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.wiki.git" wiki

      - name: Update version in Home.md
        run: |
          set -eux
          TAG="v${{ steps.ver.outputs.new }}"
          sed -i "s|## Latest release: v[0-9.]*|## Latest release: ${TAG}|" wiki/Home.md
          echo "Updated Home.md to ${TAG}"
          grep "Latest release" wiki/Home.md

      - name: Push wiki changes
        run: |
          set -eux
          cd wiki
          git diff --quiet && { echo "No wiki changes"; exit 0; }
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Home.md
          git commit -m "auto: update latest release to v$(cat ../VERSION)"
          git push
