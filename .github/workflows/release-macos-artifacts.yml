name: Release macOS Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag (for example: v0.9.16)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build macOS arm64 dylib
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install PostgreSQL headers/libs
        run: |
          set -eux
          brew install postgresql@15

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/plex-pg-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/plex-pg-core/Cargo.lock') }}

      - name: Build arm64 dylib
        run: |
          set -eux
          PG_PREFIX="$(brew --prefix postgresql@15)"
          make release-arm64 \
            CFLAGS="-Wall -Wextra -O2 -I${PG_PREFIX}/include -Iinclude -Isrc -fvisibility=hidden" \
            LDFLAGS="-L${PG_PREFIX}/lib -lpq"
          cp db_interpose_pg-arm64.dylib db_interpose_pg.dylib
          test -f db_interpose_pg-arm64.dylib
          test -f db_interpose_pg.dylib

      - name: Upload macOS dylib artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            db_interpose_pg-arm64.dylib
            db_interpose_pg.dylib
          if-no-files-found: error

  package-macos-zip:
    name: Package macOS zip bundle
    runs-on: macos-14
    needs: build
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Determine tag
        id: tag
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Build macOS zip
        run: |
          set -eux
          TAG="${{ steps.tag.outputs.value }}"
          OUT="plex-postgresql-${TAG}-macos.zip"
          STAGE="macos-zip"

          rm -rf "$STAGE"
          mkdir -p "$STAGE/scripts"

          cp release-assets/macos-arm64/db_interpose_pg-arm64.dylib "$STAGE/"
          cp release-assets/macos-arm64/db_interpose_pg.dylib "$STAGE/"

          cp README.md CHANGELOG.md INSTALL.md LICENSE THIRD_PARTY_LICENSES "$STAGE/"
          cp -R scripts/* "$STAGE/scripts/"

          (cd "$STAGE" && zip -r "../$OUT" .)

      - name: Upload macOS zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-zip
          path: plex-postgresql-*-macos.zip
          if-no-files-found: error

  upload-release:
    name: Upload macOS zip to GitHub Release
    runs-on: ubuntu-latest
    needs: package-macos-zip
    steps:
      - name: Download zip artifact
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.package-macos-zip.outputs.tag }}
          files: |
            release-assets/macos-release-zip/plex-postgresql-*-macos.zip
          overwrite_files: true
