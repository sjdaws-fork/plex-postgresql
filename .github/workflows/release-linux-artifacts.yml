name: Release Linux Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag (for example: v0.9.14)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }} artifact
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            platform: linux/amd64
            out_name: db_interpose_pg-linux-x86_64.so
          - arch: aarch64
            platform: linux/arm64
            out_name: db_interpose_pg-linux-aarch64.so

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build builder rootfs for ${{ matrix.platform }}
        run: |
          set -eux
          mkdir -p out/${{ matrix.arch }} dist
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --target builder \
            --output "type=local,dest=out/${{ matrix.arch }}" \
            .

      - name: Collect shim artifact
        run: |
          set -eux
          cp "out/${{ matrix.arch }}/libs/db_interpose_pg.so" "dist/${{ matrix.out_name }}"

      - name: Collect libpq (arm64 only)
        if: matrix.arch == 'aarch64'
        run: |
          set -eux
          cp "out/${{ matrix.arch }}/libs/libpq.so.5" "dist/libpq.so.5"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  package-linux-zip:
    name: Package Linux zip bundle
    runs-on: ubuntu-latest
    needs: build
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Determine tag
        id: tag
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Linux build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Build Linux zip
        run: |
          set -eux
          TAG="${{ steps.tag.outputs.value }}"
          STAGE="linux-zip"
          OUT="plex-postgresql-${TAG}-linux.zip"

          rm -rf "$STAGE"
          mkdir -p "$STAGE/scripts"

          cp release-assets/linux-x86_64/db_interpose_pg-linux-x86_64.so "$STAGE/"
          cp release-assets/linux-aarch64/db_interpose_pg-linux-aarch64.so "$STAGE/"
          cp release-assets/linux-aarch64/libpq.so.5 "$STAGE/"

          cp README.md CHANGELOG.md INSTALL.md LICENSE "$STAGE/"
          cp -R scripts/* "$STAGE/scripts/"

          (cd "$STAGE" && zip -r "../$OUT" .)

      - name: Upload packaged zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-zip
          path: plex-postgresql-*-linux.zip
          if-no-files-found: error

  upload-release:
    name: Upload artifacts to GitHub Release
    runs-on: ubuntu-latest
    needs: package-linux-zip
    steps:
      - name: Download zip artifact
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.package-linux-zip.outputs.tag }}
          files: |
            release-assets/linux-release-zip/plex-postgresql-*-linux.zip
          overwrite_files: true
