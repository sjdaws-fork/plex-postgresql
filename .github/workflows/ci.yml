name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  scripts:
    name: Validate shell scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax check
        run: |
          set -eu
          shopt -s nullglob
          files=(scripts/*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No scripts found under scripts/"
            exit 1
          fi
          for f in "${files[@]}"; do
            echo "Checking $f"
            bash -n "$f"
          done

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev libsqlite3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/plex-pg-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/plex-pg-core/Cargo.lock') }}

      - name: Build Rust plex-pg-core
        run: cd rust/plex-pg-core && cargo build --release

      - name: Run Rust tests
        run: cd rust/plex-pg-core && cargo test

      - name: Run C unit tests
        run: make ci-test

  unit-tests-macos:
    name: Unit tests (macOS)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL headers/libs
        run: |
          set -eux
          brew install postgresql@15

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/plex-pg-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/plex-pg-core/Cargo.lock') }}

      - name: Run Rust tests
        run: |
          set -eux
          export PLEX_PG_LIBPQ_DIR="$(brew --prefix postgresql@15)/lib"
          cd rust/plex-pg-core
          cargo test --lib

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev libsqlite3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/plex-pg-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/plex-pg-core/Cargo.lock') }}

      - name: Run Clippy
        run: |
          cd rust/plex-pg-core
          cargo clippy -- -D warnings

  ffi-header:
    name: FFI header
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cbindgen
        run: |
          if ! command -v cbindgen >/dev/null 2>&1; then
            cargo install cbindgen --locked
          fi

      - name: Verify FFI header generation
        run: make ffi-header-check

  linux-build-amd64:
    name: Build Linux amd64 shim
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build builder rootfs (linux/amd64)
        run: |
          set -eux
          mkdir -p out
          docker buildx build \
            --platform linux/amd64 \
            --target builder \
            --output type=local,dest=out \
            .

      - name: Verify build outputs
        run: |
          set -eux
          test -f out/libs/db_interpose_pg.so
          test -f out/libs/libpq.so.5
