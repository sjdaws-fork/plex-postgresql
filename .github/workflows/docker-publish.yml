name: Publish Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (for example: v0.9.16)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linuxserver
            dockerfile: Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/plex-postgresql-linuxserver
            legacy_image: ""
          - name: plexinc
            dockerfile: Dockerfile.standalone
            image: ghcr.io/${{ github.repository_owner }}/plex-postgresql-plexinc
            legacy_image: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve image tags
        id: tags
        run: |
          set -eu
          VERSION="${{ steps.version.outputs.value }}"
          LEGACY_IMAGE="${{ matrix.legacy_image }}"
          {
            echo "value<<EOF"
            echo "${{ matrix.image }}:${VERSION}"
            echo "${{ matrix.image }}:latest"
            if [ -n "$LEGACY_IMAGE" ]; then
              echo "${LEGACY_IMAGE}:${VERSION}"
              echo "${LEGACY_IMAGE}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.tags.outputs.value }}
